<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Maintainer app icon. Pairs with vault-chat main:
       same dark card background + indigo accent. Where the main
       app uses concentric halftone rings, this uses an 8-tooth
       gear — same circular footprint, same palette, but the gear
       silhouette reads instantly as "settings / system / tool" at
       any size. Designed with simple SVG primitives so it stays
       geometrically clean when rasterised at 32×32. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#23232a"/>
      <stop offset="100%" stop-color="#16161c"/>
    </linearGradient>
    <radialGradient id="gear" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="180" fill="url(#bg)"/>

  <g transform="translate(512 512)">
    <!-- 8 trapezoidal teeth, evenly spaced 45° apart. Each tooth is
         a single rectangle drawn pointing up, then rotated. Width
         narrows toward the tip via two angled corner cuts (rx). -->
    <g fill="url(#gear)">
      <g><rect x="-58" y="-400" width="116" height="140" rx="22"/></g>
      <g transform="rotate(45)"><rect x="-58" y="-400" width="116" height="140" rx="22"/></g>
      <g transform="rotate(90)"><rect x="-58" y="-400" width="116" height="140" rx="22"/></g>
      <g transform="rotate(135)"><rect x="-58" y="-400" width="116" height="140" rx="22"/></g>
      <g transform="rotate(180)"><rect x="-58" y="-400" width="116" height="140" rx="22"/></g>
      <g transform="rotate(225)"><rect x="-58" y="-400" width="116" height="140" rx="22"/></g>
      <g transform="rotate(270)"><rect x="-58" y="-400" width="116" height="140" rx="22"/></g>
      <g transform="rotate(315)"><rect x="-58" y="-400" width="116" height="140" rx="22"/></g>
    </g>

    <!-- Solid gear disc -->
    <circle r="280" fill="url(#gear)"/>

    <!-- Center hole — punches through to the dark background, giving
         the gear the donut shape that reads as "mechanical part." -->
    <circle r="110" fill="#16161c"/>

    <!-- Inner highlight ring for depth -->
    <circle r="280" fill="none" stroke="#c7d2fe" stroke-width="3" opacity="0.4"/>
  </g>
</svg>
