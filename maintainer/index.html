<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vault-chat maintainer</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: hsl(240 5% 10%);
        color: hsl(240 6% 92%);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        overflow: hidden;
      }
      #root { height: 100%; }
      #vault-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        background: hsl(240 6% 13%); color: hsl(240 5% 55%);
        letter-spacing: 0.04em; font-size: 11.5px;
        transition: opacity 180ms ease;
      }
      #vault-splash.hidden { opacity: 0; pointer-events: none; }
      #vault-splash .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: #818cf8; opacity: 0.7;
        animation: vault-pulse 1.1s ease-in-out infinite;
      }
      @keyframes vault-pulse {
        0%, 100% { opacity: 0.35; transform: scale(0.85); }
        50%      { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="vault-splash"><span class="dot"></span>maintainer</div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
