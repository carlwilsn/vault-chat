<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vault-chat</title>
    <script>
      // Set theme synchronously before any paint, so the first frame matches
      // the user's chosen theme.
      try {
        var t = localStorage.getItem("vault_chat_theme");
        document.documentElement.dataset.theme = t === "light" ? "light" : "graphite";
      } catch (e) {
        document.documentElement.dataset.theme = "graphite";
      }
    </script>
    <style>
      /* Critical CSS — applied on the first WebView paint, before Vite
         delivers the real stylesheet. Prevents the white/unstyled flash. */
      html, body {
        margin: 0;
        height: 100%;
        background: hsl(0 0% 10%);
        color: hsl(0 0% 92%);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        overflow: hidden;
      }
      html[data-theme="light"], html[data-theme="light"] body {
        background: hsl(0 0% 98%);
        color: hsl(0 0% 12%);
      }
      #root { height: 100%; }

      /* Splash sits on top of #root while React mounts and the initial
         vault/file listing resolves. It fades out the moment the app
         signals it's ready. */
      #vault-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: hsl(0 0% 13%);
        color: hsl(0 0% 55%);
        letter-spacing: 0.04em;
        font-size: 11.5px;
        transition: opacity 180ms ease;
      }
      html[data-theme="light"] #vault-splash {
        background: hsl(0 0% 100%);
        color: hsl(0 0% 42%);
      }
      #vault-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #vault-splash .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        opacity: 0.5;
        animation: vault-pulse 1.1s ease-in-out infinite;
      }
      @keyframes vault-pulse {
        0%, 100% { opacity: 0.25; transform: scale(0.85); }
        50%      { opacity: 0.85; transform: scale(1); }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="vault-splash"><span class="dot"></span>vault-chat</div>
    <!-- Diagnostic panel: catches any unhandled error / promise rejection
         and renders the message + stack on screen, since we have no
         DevTools in production builds. Stays hidden until something
         throws. Will be removed once we've identified the v0.1.7 crash. -->
    <div id="vault-error" style="display:none;position:fixed;inset:0;z-index:99999;background:#1f1f23;color:#ffb4b4;font-family:ui-monospace,Menlo,monospace;font-size:12px;padding:24px;overflow:auto;white-space:pre-wrap;"></div>
    <script>
      (function () {
        var panel = document.getElementById("vault-error");
        function show(label, payload) {
          panel.style.display = "block";
          var splash = document.getElementById("vault-splash");
          if (splash) splash.style.display = "none";
          panel.textContent =
            "vault-chat diagnostic — caught a runtime error:\n\n" +
            label + "\n\n" + payload + "\n\n" +
            "Screenshot this and paste it back in chat. Then install v0.1.6 to recover.";
        }
        window.addEventListener("error", function (e) {
          var msg = (e && e.message) || String(e);
          var stack = (e && e.error && e.error.stack) || "(no stack)";
          show("window.onerror: " + msg, stack);
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = (e && e.reason) || e;
          var msg = (r && r.message) || String(r);
          var stack = (r && r.stack) || "(no stack)";
          show("unhandledrejection: " + msg, stack);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
