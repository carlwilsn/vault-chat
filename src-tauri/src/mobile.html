<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Vault</title>
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #f4f4f4;
    --mute: #888;
    --accent: #4ade80;
    --listen: #ef4444;
    --think: #f59e0b;
    --speak: #60a5fa;
    --pill-bg: #1a1a1a;
    --pill-active: #2a2a2a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    overflow: hidden;
    user-select: none; -webkit-user-select: none;
  }
  body {
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
  }
  .top {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 4px 0;
  }
  .model-toggle {
    display: flex; gap: 4px;
    background: var(--pill-bg); border-radius: 999px; padding: 4px;
  }
  .model-toggle button {
    background: transparent; color: var(--mute); border: none;
    padding: 6px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .model-toggle button.active { background: var(--pill-active); color: var(--fg); }
  .reset-btn {
    background: transparent; border: none; color: var(--mute);
    font-size: 13px; padding: 6px 12px; cursor: pointer;
  }
  .conn {
    text-align: center; font-size: 11px; color: var(--mute);
    padding: 4px; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .conn.bad { color: var(--listen); }
  .transcript {
    flex: 1; overflow-y: auto;
    padding: 16px 4px;
    font-size: 16px; line-height: 1.5;
    -webkit-overflow-scrolling: touch;
  }
  .turn { margin-bottom: 16px; }
  .turn .who {
    font-size: 11px; color: var(--mute); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .turn.you .who { color: var(--accent); }
  .turn.agent .who { color: var(--speak); }
  .turn .body { white-space: pre-wrap; }
  .tools { font-size: 12px; color: var(--mute); font-style: italic; }
  .controls {
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 0 24px; gap: 12px;
  }
  .status {
    font-size: 14px; color: var(--mute); height: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .status .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--mute);
  }
  .status[data-state="listening"] { color: var(--listen); }
  .status[data-state="listening"] .dot { background: var(--listen); animation: pulse 1s infinite; }
  .status[data-state="thinking"] { color: var(--think); }
  .status[data-state="thinking"] .dot { background: var(--think); animation: spin 1s linear infinite; }
  .status[data-state="speaking"] { color: var(--speak); }
  .status[data-state="speaking"] .dot { background: var(--speak); animation: pulse 0.6s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }
  @keyframes spin {
    0% { transform: rotate(0); border-radius: 0; }
    50% { border-radius: 50%; }
    100% { transform: rotate(360deg); border-radius: 0; }
  }
  .mic {
    width: 120px; height: 120px; border-radius: 50%;
    border: none; background: var(--accent); color: #000;
    font-size: 48px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s, background 0.2s;
    box-shadow: 0 8px 24px rgba(74, 222, 128, 0.3);
  }
  .mic:active { transform: scale(0.94); }
  .mic[data-state="listening"] { background: var(--listen); box-shadow: 0 8px 24px rgba(239, 68, 68, 0.4); }
  .mic[data-state="thinking"] { background: var(--think); box-shadow: 0 8px 24px rgba(245, 158, 11, 0.4); }
  .mic[data-state="speaking"] { background: var(--speak); box-shadow: 0 8px 24px rgba(96, 165, 250, 0.4); }
  .partial {
    min-height: 24px; text-align: center; color: var(--mute);
    font-size: 14px; font-style: italic; padding: 0 8px;
  }
</style>
</head>
<body>
  <div class="top">
    <div class="model-toggle">
      <button data-model="claude-haiku-4-5-20251001" class="active">Haiku</button>
      <button data-model="claude-opus-4-7">Opus</button>
    </div>
    <button class="reset-btn" id="reset">reset</button>
  </div>
  <div class="conn" id="conn">connecting…</div>
  <div class="transcript" id="transcript"></div>
  <div class="partial" id="partial"></div>
  <div class="controls">
    <div class="status" id="status" data-state="idle"><span class="dot"></span><span id="status-text">tap mic to speak</span></div>
    <button class="mic" id="mic" data-state="idle">🎙</button>
  </div>

<script>
  const TOKEN = "__TOKEN__";
  const wsUrl = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws/${TOKEN}`;

  const statusEl = document.getElementById("status");
  const statusText = document.getElementById("status-text");
  const micBtn = document.getElementById("mic");
  const transcriptEl = document.getElementById("transcript");
  const partialEl = document.getElementById("partial");
  const connEl = document.getElementById("conn");
  const resetBtn = document.getElementById("reset");
  const modelBtns = document.querySelectorAll(".model-toggle button");

  let model = "claude-haiku-4-5-20251001";
  let ws = null;
  let recog = null;
  let currentReqId = null;
  let speechBuffer = "";
  let agentTurnEl = null;
  let synthQueue = [];
  let synthSpeaking = false;

  // --- state machine ---
  function setState(s, msg) {
    statusEl.dataset.state = s;
    micBtn.dataset.state = s;
    statusText.textContent = msg ?? ({
      idle: "tap mic to speak",
      listening: "listening…",
      thinking: "thinking…",
      speaking: "tap mic to interrupt",
    }[s] || s);
  }

  // --- transcript ---
  function appendTurn(role, text) {
    const div = document.createElement("div");
    div.className = `turn ${role === "user" ? "you" : "agent"}`;
    div.innerHTML = `<div class="who">${role === "user" ? "you" : "vault"}</div><div class="body"></div>`;
    div.querySelector(".body").textContent = text;
    transcriptEl.appendChild(div);
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
    return div;
  }
  function appendTool(name) {
    const div = document.createElement("div");
    div.className = "turn tools";
    div.textContent = `· ${name}`;
    transcriptEl.appendChild(div);
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
  }

  // --- TTS — speak in sentence-sized chunks for low perceived latency ---
  function flushSpeech(force) {
    const re = /[.!?…]\s|[.!?…]$|\n/;
    while (true) {
      const m = speechBuffer.match(re);
      if (!m && !force) break;
      const cut = m ? m.index + m[0].length : speechBuffer.length;
      const chunk = speechBuffer.slice(0, cut).trim();
      speechBuffer = speechBuffer.slice(cut);
      if (chunk) enqueueSpeech(chunk);
      if (!m) break;
    }
  }
  function enqueueSpeech(text) {
    synthQueue.push(text);
    if (!synthSpeaking) speakNext();
  }
  function speakNext() {
    if (synthQueue.length === 0) {
      synthSpeaking = false;
      return;
    }
    synthSpeaking = true;
    const u = new SpeechSynthesisUtterance(synthQueue.shift());
    u.rate = 1.05; u.pitch = 1.0;
    const voice = pickVoice();
    if (voice) u.voice = voice;
    u.onend = speakNext;
    u.onerror = speakNext;
    setState("speaking");
    speechSynthesis.speak(u);
  }
  let cachedVoice = null;
  function pickVoice() {
    if (cachedVoice) return cachedVoice;
    const voices = speechSynthesis.getVoices();
    const prefer = voices.find(v => /Samantha|Karen|Daniel|Moira/i.test(v.name) && /en/i.test(v.lang))
      || voices.find(v => /en[-_]US/i.test(v.lang))
      || voices[0];
    cachedVoice = prefer || null;
    return cachedVoice;
  }
  speechSynthesis.onvoiceschanged = () => { cachedVoice = null; };
  function cancelSpeech() {
    synthQueue = [];
    synthSpeaking = false;
    speechBuffer = "";
    speechSynthesis.cancel();
  }

  // --- WebSocket ---
  function connect() {
    ws = new WebSocket(wsUrl);
    ws.onopen = () => { connEl.textContent = "connected"; connEl.classList.remove("bad"); };
    ws.onclose = () => {
      connEl.textContent = "disconnected — reconnecting…";
      connEl.classList.add("bad");
      setTimeout(connect, 1500);
    };
    ws.onerror = () => { connEl.textContent = "connection error"; connEl.classList.add("bad"); };
    ws.onmessage = (ev) => {
      let msg; try { msg = JSON.parse(ev.data); } catch { return; }
      if (msg.id && msg.id !== currentReqId) return;
      switch (msg.type) {
        case "text":
          if (!agentTurnEl) {
            agentTurnEl = appendTurn("agent", "");
          }
          agentTurnEl.querySelector(".body").textContent += msg.delta;
          transcriptEl.scrollTop = transcriptEl.scrollHeight;
          speechBuffer += msg.delta;
          flushSpeech(false);
          break;
        case "tool":
          appendTool(msg.name);
          break;
        case "thinking":
          // Already in thinking state from request send; this just confirms.
          break;
        case "done":
          flushSpeech(true);
          if (synthQueue.length === 0 && !synthSpeaking) setState("idle");
          break;
        case "error":
          appendTurn("agent", `⚠ ${msg.message}`);
          setState("idle");
          break;
      }
    };
  }
  connect();

  // --- Speech recognition ---
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setState("idle", "speech not supported in this browser");
    micBtn.disabled = true;
  }

  function startListening() {
    if (!SR) {
      setState("idle", "speech not supported — try Safari");
      return;
    }
    cancelSpeech();
    // Always create a fresh instance — iOS throws InvalidStateError if
    // you call .start() on a previously-ended recognizer.
    recog = new SR();
    recog.lang = "en-US";
    recog.interimResults = true;
    recog.continuous = false;
    recog.onresult = (e) => {
      let interim = "", final = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t; else interim += t;
      }
      partialEl.textContent = interim || final;
      if (final) {
        partialEl.textContent = "";
        submitTurn(final.trim());
      }
    };
    recog.onerror = (e) => {
      console.warn("[recog] error:", e.error);
      recog = null;
      if (e.error === "not-allowed") {
        setState("idle", "mic blocked — allow in Safari settings");
      } else if (e.error === "no-speech") {
        setState("idle", "didn't catch that — tap to try again");
      } else {
        setState("idle", `mic error: ${e.error}`);
      }
    };
    recog.onend = () => {
      recog = null;
      if (statusEl.dataset.state === "listening") setState("idle");
    };
    setState("listening");
    try {
      recog.start();
    } catch (err) {
      recog = null;
      setState("idle", `couldn't start mic: ${err.message}`);
    }
  }
  function stopListening() {
    if (recog) { try { recog.stop(); } catch {} recog = null; }
  }

  function submitTurn(text) {
    if (!text || ws?.readyState !== 1) return;
    appendTurn("user", text);
    agentTurnEl = null;
    speechBuffer = "";
    currentReqId = Math.random().toString(36).slice(2, 12);
    setState("thinking");
    ws.send(JSON.stringify({ type: "chat", id: currentReqId, text, model }));
  }

  // --- Controls ---
  micBtn.addEventListener("click", () => {
    const s = micBtn.dataset.state;
    if (s === "idle") startListening();
    else if (s === "listening") stopListening();
    else if (s === "speaking") { cancelSpeech(); setState("idle"); }
    else if (s === "thinking") {
      if (currentReqId && ws?.readyState === 1) {
        ws.send(JSON.stringify({ type: "abort", id: currentReqId }));
      }
      setState("idle");
    }
  });
  modelBtns.forEach((btn) => {
    btn.addEventListener("click", () => {
      modelBtns.forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      model = btn.dataset.model;
    });
  });
  resetBtn.addEventListener("click", () => {
    if (!confirm("Clear conversation?")) return;
    transcriptEl.innerHTML = "";
    cancelSpeech();
    if (ws?.readyState === 1) ws.send(JSON.stringify({ type: "reset" }));
    setState("idle");
  });

  // iOS: nudge SpeechSynthesis to load voices
  speechSynthesis.getVoices();
</script>
</body>
</html>
