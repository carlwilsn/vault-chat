name: ship-maintainer

# Builds + publishes the maintainer app independently from the main
# vault-chat app. Path-filtered so trivial changes elsewhere don't
# burn a build. The maintainer's update cadence is intentionally low
# — its whole value proposition is staying stable for months.

on:
  push:
    branches: [main]
    paths:
      - "maintainer/**"
      - ".github/workflows/ship-maintainer.yml"
  workflow_dispatch:

concurrency:
  group: ship-maintainer
  cancel-in-progress: true

jobs:
  ship:
    # Same kill switch as ship.yml — when SHIP_PAUSED=true, no
    # publishing. Maintainer-update builds also obey it so a
    # paused state is truly silent.
    if: vars.SHIP_PAUSED != 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    defaults:
      run:
        working-directory: maintainer
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: maintainer/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: maintainer/src-tauri

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      # Auto-bump the patch version when there are unreleased
      # maintainer-touching commits AND the current version equals
      # the most recently released tag. Removes the manual-bump
      # footgun that used to silently no-op the workflow.
      - name: Auto-bump version if unreleased changes exist
        id: autobump
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          CURRENT=$(node -e "console.log(require('./maintainer/package.json').version)")
          # Most recent released maintainer tag (e.g. maintainer-v0.1.5).
          # NOTE: GitHub's releases API list returns tags in lexicographic
          # order, so v0.1.10 sorts BEFORE v0.1.2 — taking m[0] gives a
          # stale answer once the patch number hits double digits and was
          # what froze the maintainer at v0.1.10. Sort by created_at desc.
          LAST_TAG=$(curl -sH "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" \
            | node -e "const r=JSON.parse(require('fs').readFileSync(0,'utf8')); const m=r.filter(x=>x.tag_name && x.tag_name.startsWith('maintainer-v')).sort((a,b)=>Date.parse(b.created_at)-Date.parse(a.created_at)); console.log(m.length?m[0].tag_name.replace(/^maintainer-v/,''):'')")
          echo "Current package version: $CURRENT"
          echo "Last released maintainer version: ${LAST_TAG:-(none)}"
          if [ -n "$LAST_TAG" ] && [ "$CURRENT" = "$LAST_TAG" ]; then
            # Compute next patch.
            IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
            NEW="$MAJ.$MIN.$((PAT+1))"
            echo "Auto-bumping $CURRENT -> $NEW"
            node -e "const fs=require('fs');const f='maintainer/package.json';const j=JSON.parse(fs.readFileSync(f,'utf8'));j.version='$NEW';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
            sed -i.bak "s/^version = \"$CURRENT\"/version = \"$NEW\"/" maintainer/src-tauri/Cargo.toml && rm maintainer/src-tauri/Cargo.toml.bak
            sed -i.bak "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW\"/" maintainer/src-tauri/tauri.conf.json && rm maintainer/src-tauri/tauri.conf.json.bak
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add maintainer/package.json maintainer/src-tauri/Cargo.toml maintainer/src-tauri/tauri.conf.json
            git commit -m "maintainer-v$NEW [skip ci]"
            # Race-safe push: ship.yml may also be pushing main-app
            # version bumps in parallel. Rebase on top, retry on tight
            # races.
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              echo "push attempt $attempt failed — retrying"
              sleep 2
            done
            echo "version=$NEW" >> $GITHUB_OUTPUT
          else
            echo "No bump needed (manual bump or first release)."
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
          fi

      - name: Read version
        id: version
        shell: bash
        run: |
          V="${{ steps.autobump.outputs.version }}"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Maintainer version: $V"

      - name: Check if release exists
        id: release_check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="maintainer-v${{ steps.version.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists — skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build, publish release
        if: steps.release_check.outputs.exists == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Maintainer has its own dedicated minisign keypair (separate
          # trust domain from the main app) — see #26 fix. Key MUST be
          # generated via `npx tauri signer generate` (header reads
          # "rsign encrypted secret key") with an empty password — NOT
          # via `minisign -G -W`, which produces a bare-minisign format
          # tauri-bundler cannot parse and fails with "incorrect updater
          # private key password". Password env var stays mapped to a
          # secret so we can switch to a passworded key later without
          # editing the workflow.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.MAINTAINER_TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.MAINTAINER_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: maintainer
          tagName: maintainer-v${{ steps.version.outputs.version }}
          releaseName: vault-chat maintainer v${{ steps.version.outputs.version }}
          releaseBody: |
            Maintainer companion app. Install over an existing maintainer install.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      # Maintain a moving "maintainer-latest" release that always
      # points at the most recent maintainer build. The maintainer's
      # Tauri updater hits its `latest.json` asset to discover new
      # versions — without this stable pointer, the updater can't know
      # which release is current (the GH "/releases/latest/" alias
      # gets clobbered by the main app's frequent releases).
      - name: Update maintainer-latest pointer
        if: steps.release_check.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="maintainer-v${{ steps.version.outputs.version }}"
          mkdir -p /tmp/latest
          gh release download "$TAG" --repo ${{ github.repository }} --pattern latest.json --dir /tmp/latest
          # Best-effort delete of any prior pointer release and tag.
          gh release delete maintainer-latest --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true
          gh release create maintainer-latest /tmp/latest/latest.json \
            --repo ${{ github.repository }} \
            --target ${{ github.sha }} \
            --title "Maintainer auto-update channel" \
            --notes "Auto-maintained pointer to the latest maintainer release. Do not delete — the maintainer's Tauri updater fetches latest.json from this release."
