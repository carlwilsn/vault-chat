name: ship

# Daily auto-release loop, plus push-triggered shipping when source under
# src/** or src-tauri/** changes. The path filter keeps trivial commits
# (workflow tweaks, docs, scripts) from burning a build; the daily cron
# is the safety net so you never go more than 24h without a release if
# you push something the path filter doesn't catch. Wakes up, checks if
# there are any new commits on main since the last release tag, and if
# so: bumps the patch version, commits the bump back to main with
# [skip ci] (which prevents this workflow from re-firing on its own
# version-bump push), builds + signs the Windows installer, and
# publishes a GitHub Release with the updater manifest. The installed
# app sees it on next launch.
#
# Manual escape hatch lives in release.yml — push a v* tag yourself if you
# want to force a release outside the cron.

on:
  schedule:
    # 11:00 UTC = 7am EDT / 6am EST. Tweak this if you want a different
    # "morning digest" time.
    - cron: "0 11 * * *"
  push:
    branches: [main]
    # Only ship when something that actually goes into the bundled app
    # changes. Workflow tweaks, READMEs, the meta-tools-staging area,
    # and feedback images don't justify a 15-minute build.
    paths:
      - "src/**"
      - "src-tauri/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tailwind.config.js"
      - "vite.config.ts"
      - "tsconfig.json"
  workflow_dispatch:

# Coalesce a flurry of pushes (e.g. the auto-fix agent landing four
# fixes back-to-back) into a single build. cancel-in-progress kills the
# running build when a fresh commit arrives so we always ship the tip
# of main rather than a stale interim state.
concurrency:
  group: ship
  cancel-in-progress: true

jobs:
  ship:
    # Maintainer has a kill switch (System tab → Pause auto-ship) that
    # sets repo variable SHIP_PAUSED=true. When paused, builds are
    # skipped — commits keep landing on main, but no release publishes
    # until unpaused. Useful before sleep, exam week, demos.
    if: vars.SHIP_PAUSED != 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      # Vite's transform pass needs more heap than Node's Windows default.
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Check for new commits since last release
        id: changes
        shell: bash
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "First release — proceeding"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            COUNT=$(git rev-list --count "$LAST_TAG"..HEAD)
            if [ "$COUNT" -gt 0 ]; then
              echo "$COUNT new commits since $LAST_TAG — shipping"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "No new commits since $LAST_TAG — nothing to do"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Type check
        if: steps.changes.outputs.has_changes == 'true'
        run: npx tsc --noEmit

      - name: Bump version
        if: steps.changes.outputs.has_changes == 'true'
        id: bump
        shell: bash
        run: |
          NEW=$(node scripts/bump-version.mjs)
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped to v$NEW"

      - name: Commit version bump back to main
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "v${{ steps.bump.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Build, sign, publish release
        if: steps.changes.outputs.has_changes == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ steps.bump.outputs.version }}
          releaseName: vault-chat v${{ steps.bump.outputs.version }}
          releaseBody: |
            Auto-released from main. See the commit log for what changed.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
