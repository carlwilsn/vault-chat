name: ship

# Daily auto-release loop. Wakes up once a morning, checks if there are any
# new commits on main since the last release tag, and if so: bumps the patch
# version, commits the bump back to main with [skip ci], builds + signs the
# Windows installer, and publishes a GitHub Release with the updater
# manifest. The installed app sees it on next launch.
#
# Manual escape hatch lives in release.yml — push a v* tag yourself if you
# want to force a release outside the cron.

on:
  schedule:
    # 11:00 UTC = 7am EDT / 6am EST. Tweak this if you want a different
    # "morning digest" time.
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  ship:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Check for new commits since last release
        id: changes
        shell: bash
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "First release — proceeding"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            COUNT=$(git rev-list --count "$LAST_TAG"..HEAD)
            if [ "$COUNT" -gt 0 ]; then
              echo "$COUNT new commits since $LAST_TAG — shipping"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "No new commits since $LAST_TAG — nothing to do"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Type check
        if: steps.changes.outputs.has_changes == 'true'
        run: npx tsc --noEmit

      - name: Bump version
        if: steps.changes.outputs.has_changes == 'true'
        id: bump
        shell: bash
        run: |
          NEW=$(node scripts/bump-version.mjs)
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped to v$NEW"

      - name: Commit version bump back to main
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "v${{ steps.bump.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Build, sign, publish release
        if: steps.changes.outputs.has_changes == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ steps.bump.outputs.version }}
          releaseName: vault-chat v${{ steps.bump.outputs.version }}
          releaseBody: |
            Auto-released from main. See the commit log for what changed.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
